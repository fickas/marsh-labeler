# First real pipeline -> app ingest: the synthetic Model-1 flight.
#
# `name: demo_synthetic` matches the flight seed.py already created, so this
# ingest REPLACES that task's round-1 placeholder chips with real rendered
# crops -- no duplicate task card. The seed's class scheme already matches the
# synthetic 6-class default, so the `classes:` block is omitted on purpose
# (ingest falls back to app/constants.DEFAULT_SCHEME).
#
# >>> Set DATA to wherever your synthetic pipeline outputs live on this Mac.
#     YAML has no variables, so the paths below spell it out -- if you keep the
#     rasters somewhere else, find-replace `data/synthetic/`. Paths are relative
#     to the repo root (run the commands from there, same as seed.py).

name: demo_synthetic
project: Wellfleet
crs: EPSG:26919
gsd_cm: 1.0
round: 1

review_gpkg:    data/synthetic/abstain_review.gpkg   # build_abstain_review_polygons() output
ortho_path:     data/synthetic/pansharp_5band.tif    # the MB5 -- bands B,G,R,RE,NIR
superpixel_path: data/synthetic/superpixels.tif      # uint32 superpixel-id raster
abstain_path:   data/synthetic/abstain.tif
softmax_path:   data/synthetic/softmax.tif           # cached per-pixel softmax -> model_probs bars

context_pad_px: 64
replication_target: 1

# Chip views. truecolor + cir are RGB composites pulled straight from the MB5;
# the third is a single-band structural view. pan is guaranteed to exist and
# reads cleanly in grayscale -- swap to your tpi_small/roughness band (commented
# below) if you'd rather the third view be the true geomorphic layer.
views:
  - name: truecolor
    bands: [3, 2, 1]                       # R=3, G=2, B=1
  - name: cir
    bands: [5, 3, 2]                       # NIR,R,G -- vegetation pops, channels go dark
  - name: pan
    source_path: data/synthetic/pan.tif
    cmap: gray
  # - name: geomorphic
  #   source_path: data/synthetic/tpi_small.tif
  #   cmap: viridis

# Reference gallery: rendered from the synthetic ground-truth polygons (the
# class-labeled layer you generated alongside the imagery). `class` is the
# integer class column on that layer -- rename if yours differs.
labeled_polygons: data/synthetic/gt_labeled.gpkg
selection_params_path: data/synthetic/selection_params.json
label_class_field: class_id
examples_per_class: 5
exemplar_crop_px: 128                       # interior window; tune to match container chip zoom

# Omit `classes:` -> synthetic default (other / healthy_bank / eroding_non_crab /
# crab_edge / crab_platform / collapsed; damage=[3,4,5]; ignore_index=255).
