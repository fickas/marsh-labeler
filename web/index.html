<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marsh Labeler</title>
<style>
  :root {
    --bg: #0e1416; --panel: #161d22; --panel2: #1d262c; --line: #28333a;
    --ink: #e8eef0; --muted: #8aa0a8;
    --a: #46b7a6; --b: #e0913f;        /* the two contested sides */
    --a-dim: #1c3b39; --b-dim: #3b2f1c;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
         -webkit-font-smoothing: antialiased; }
  header { display: flex; align-items: baseline; gap: 1.25rem; padding: .7rem 1.1rem;
           border-bottom: 1px solid var(--line); }
  header .brand { font-weight: 650; letter-spacing: -.01em; }
  header .flight { color: var(--muted); font-family: var(--mono); font-size: .85rem; }
  header .spacer { flex: 1; }
  header .who { color: var(--muted); font-size: .85rem; }
  header .who b { color: var(--ink); font-weight: 600; }
  header .progress { font-family: var(--mono); font-size: .85rem; color: var(--muted); }
  header button.link { background: none; border: none; color: var(--muted);
           text-decoration: underline; cursor: pointer; font-size: .8rem; padding: 0; }
  header a.brand { text-decoration: none; color: inherit; }
  header a.navlink { color: var(--muted); text-decoration: none; font-size: .85rem; }
  header a.navlink:hover { color: var(--ink); }

  main { max-width: 1140px; margin: 0 auto; padding: 1.1rem; }
  .ask { text-align: center; margin: .4rem 0 1rem; color: var(--muted); font-size: .95rem; }
  .ask b.l { color: var(--a); } .ask b.r { color: var(--b); }

  .triptych { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 1rem; align-items: start; }
  .gallery h3 { margin: 0 0 .5rem; font-size: .8rem; text-transform: uppercase;
           letter-spacing: .08em; font-weight: 600; }
  .gallery.l h3 { color: var(--a); } .gallery.r h3 { color: var(--b); }
  .gallery .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .4rem; }
  .gallery img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px;
           display: block; background: var(--panel2); }
  .gallery.l img { border: 1px solid var(--a-dim); }
  .gallery.r img { border: 1px solid var(--b-dim); }
  .gallery .none { color: var(--muted); font-size: .8rem; }

  .center { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
            padding: .8rem; }
  .center .chip { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;
            background: var(--panel2); display: block; }
  .views { display: flex; gap: .35rem; justify-content: center; margin: .6rem 0 .2rem; }
  .views button { background: var(--panel2); color: var(--muted); border: 1px solid var(--line);
            border-radius: 999px; padding: .2rem .7rem; font-size: .78rem; cursor: pointer; }
  .views button[aria-pressed="true"] { color: var(--ink); border-color: var(--muted); }
  .meta { display: flex; justify-content: space-between; gap: 1rem; margin-top: .7rem;
            font-family: var(--mono); font-size: .76rem; color: var(--muted); }
  .probs { margin-top: .6rem; }
  .probs .row { display: flex; align-items: center; gap: .5rem; margin: .2rem 0; font-size: .8rem; }
  .probs .name { width: 6.5rem; text-align: right; color: var(--muted); }
  .probs .bar { flex: 1; height: 8px; background: var(--panel2); border-radius: 4px; overflow: hidden; }
  .probs .bar span { display: block; height: 100%; }
  .probs .val { width: 3rem; font-family: var(--mono); }
  .comp { margin-top: .6rem; font-size: .8rem; }
  .comp-head { font-family: var(--mono); color: var(--muted); margin-bottom: .35rem; }
  .comp-row { display: flex; flex-wrap: wrap; align-items: baseline; gap: .35rem; margin: .25rem 0; }
  .comp-lbl { color: var(--muted); width: 4.2rem; text-align: right; flex: none; font-size: .74rem; }
  .comp .ctag { display: inline-block; background: var(--panel2); border-radius: 4px;
                padding: .12rem .45rem; font-family: var(--mono); font-size: .74rem; line-height: 1.5; }
  .comp .ctag.muted { color: var(--muted); }
  .comp-hint { margin-top: .5rem; padding-left: .5rem; border-left: 2px solid var(--a); font-style: italic; }

  .actions { margin-top: 1.1rem; }
  .sides { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }
  .sides button { padding: .9rem; border-radius: 10px; border: 1px solid; cursor: pointer;
            font-size: 1rem; font-weight: 600; color: var(--ink); background: transparent; }
  .sides .a { border-color: var(--a); } .sides .a:hover { background: var(--a-dim); }
  .sides .b { border-color: var(--b); } .sides .b:hover { background: var(--b-dim); }
  .sides .key { font-family: var(--mono); color: var(--muted); font-weight: 400; font-size: .8rem; }

  .palette { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin-top: .8rem; }
  .palette button, .escape button { background: var(--panel2); color: var(--ink);
            border: 1px solid var(--line); border-radius: 7px; padding: .4rem .7rem;
            font-size: .82rem; cursor: pointer; }
  .palette button:hover, .escape button:hover { border-color: var(--muted); }
  .palette .lbl { color: var(--muted); font-size: .76rem; align-self: center; margin-right: .2rem; }
  .escape { display: flex; gap: .4rem; justify-content: center; margin-top: .6rem; }
  .escape button .key { color: var(--muted); font-family: var(--mono); font-size: .72rem; }

  .empty, .gate { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .gate input { background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
            padding: .5rem .7rem; border-radius: 7px; font-size: 1rem; }
  .gate button { margin-left: .5rem; padding: .5rem .9rem; border-radius: 7px;
            border: 1px solid var(--a); background: transparent; color: var(--ink); cursor: pointer; }
  button:focus-visible { outline: 2px solid var(--a); outline-offset: 2px; }
  @media (max-width: 760px) { .triptych { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <a class="brand" href="/">Marsh Labeler</a>
  <a class="navlink" href="/">Tasks</a>
  <a class="navlink" href="/progress">Progress</a>
  <span class="flight" id="flightName">—</span>
  <span class="spacer"></span>
  <span class="progress" id="progress"></span>
  <span class="who" id="who"></span>
  <button class="link" id="changeUser" hidden>change</button>
</header>

<main id="main"></main>

<script>
const API = "";
let state = { flightId: null, scheme: null, selection: null, view: "truecolor", current: null,
              user: localStorage.getItem("ml_user") || "" };

const $ = (s, r=document) => r.querySelector(s);
function el(tag, attrs={}, kids=[]) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "html") e.innerHTML = v;
    else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of [].concat(kids)) e.append(c);
  return e;
}

async function api(path, opts) {
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error((await r.text()) || r.status);
  return r.json();
}

function gate() {
  $("#main").replaceChildren(el("div", {class:"gate"}, [
    el("p", {html: "Enter your email to start labeling. Your answers are recorded under it."}),
    el("input", {id:"email", type:"email", placeholder:"you@uoregon.edu",
                 value: state.user, onkeydown:(e)=>{ if(e.key==="Enter") setUser(); }}),
    el("button", {onclick:setUser}, "Start"),
  ]));
  $("#email").focus();
}
function setUser() {
  const v = $("#email").value.trim();
  if (!v) return;
  state.user = v; localStorage.setItem("ml_user", v);
  start();
}

async function start() {
  $("#who").textContent = "labeling as ";
  $("#who").append(el("b", {}, state.user));
  $("#changeUser").hidden = false;
  const flights = await api("/api/flights");
  if (!flights.length) { $("#main").replaceChildren(el("div",{class:"empty"},
      "No flights yet. Seed one with python seed.py, then reload.")); return; }
  const want = new URLSearchParams(location.search).get("flight");
  const f = (want && flights.find(x => String(x.id) === String(want))) || flights[0];
  state.flightId = f.id; state.scheme = f.class_scheme; state.selection = f.selection_params;
  $("#flightName").textContent = f.name;
  loadNext();
}

async function loadNext() {
  const data = await api(`/api/flights/${state.flightId}/next?user=${encodeURIComponent(state.user)}`);
  const p = data.progress;
  $("#progress").textContent = `${p.labeled} labeled · ${p.settled} settled · round ${p.round}`;
  if (data.done) {
    $("#main").replaceChildren(el("div",{class:"empty"},[
      el("p",{}, "Queue clear for this round — nothing left here for you to label. Check back after the next retrain."),
      el("p",{}, el("a",{href:"/", style:"color:var(--a)"}, "← Back to tasks")),
    ]));
    return;
  }
  state.current = data;
  state.scheme = data.scheme;
  render();
}

function chipUrl(keys) { return keys ? (keys[state.view] || Object.values(keys)[0]) : ""; }
function names() { return (state.scheme && state.scheme.names) || {}; }

function gallery(side, classId) {
  const list = (state.current.exemplars[String(classId)]) || [];
  const grid = el("div", {class:"grid"});
  if (!list.length) grid.append(el("span",{class:"none"},"no exemplars"));
  for (const ex of list.slice(0,4)) grid.append(el("img",{src:chipUrl(ex.chip_keys), alt:""}));
  return el("div", {class:`gallery ${side}`}, [
    el("h3", {}, names()[classId] || `class ${classId}`),
    grid,
  ]);
}

function probRow(classId) {
  const c = state.current.container;
  const p = (c.model_probs && (c.model_probs[String(classId)] ?? c.model_probs[classId])) || 0;
  const color = classId === c.class_a ? "var(--a)" : (classId === c.class_b ? "var(--b)" : "var(--muted)");
  return el("div",{class:"row"},[
    el("span",{class:"name"}, names()[classId] || `class ${classId}`),
    el("div",{class:"bar"}, el("span",{style:`width:${Math.round(p*100)}%;background:${color}`})),
    el("span",{class:"val"}, p ? p.toFixed(2) : "—"),
  ]);
}

// All classes, highest mean first, so it's clear where the probability mass
// sits. The contested pair stays color-highlighted (teal/amber) wherever it
// lands; everything else is muted. These are means over the whole superpixel --
// the per-pixel margin that triggered the question is summarized by `abstain %`.
function probRows() {
  const c = state.current.container;
  const p = id => (c.model_probs && (c.model_probs[String(id)] ?? c.model_probs[id])) || 0;
  const ids = Object.keys(names()).map(Number).sort((x,y) => p(y) - p(x));
  return ids.map(probRow);
}

// The honest decomposition: how the superpixel's pixels split into confident
// (broken down by class) vs the abstain "questions" (contested-pair counts) vs
// diffuse -- plus a suggested read. Falls back to the mean bars if a flight was
// ingested without an abstain raster (so no composition was computed).
function compHint(comp, c, nm) {
  if (!comp || !comp.confident || comp.confident.length === 0)
    return "little confident signal here — judge from the imagery and exemplars.";
  const top = comp.confident[0];
  const topName = nm[top.c] || `class ${top.c}`;
  const confPurity = comp.n_confident ? top.n / comp.n_confident : 0;
  const confShare = comp.n ? comp.n_confident / comp.n : 0;
  const domQ = (comp.questions && comp.questions[0]) || null;
  const inQ = domQ && (domQ.a === top.c || domQ.b === top.c);
  const sig = comp.confident.filter(x => x.n / comp.n_confident >= 0.2);
  if (sig.length >= 2)
    return "confident pixels span more than one class — this patch may straddle a boundary; consider Needs split.";
  if (confPurity >= 0.9 && confShare >= 0.2 && inQ) {
    const other = nm[domQ.a === top.c ? domQ.b : domQ.a] || "the other class";
    return `likely ${topName} — confident pixels are almost all ${topName}, and the unsure ones are torn between it and ${other}.`;
  }
  if (comp.n_diffuse && comp.n_diffuse >= comp.n_abstain)
    return "diffuse uncertainty — the model has no clear top two here; judge from the imagery.";
  return `leans ${topName}, but not cleanly — weigh the imagery and exemplars.`;
}

function compPanel() {
  const c = state.current.container;
  const comp = c.composition;
  if (!comp)
    return el("div",{class:"probs"},[
      el("div",{style:"font-size:.7rem;color:var(--muted);margin-bottom:.2rem"},
        "model mean over superpixel"),
      ...probRows(),
    ]);
  const nm = names();
  const color = id => id === c.class_a ? "var(--a)" : (id === c.class_b ? "var(--b)" : "var(--muted)");
  const head = el("div",{class:"comp-head"},
    `${comp.n} px · ${comp.n_confident} confident · ${comp.n_abstain} unsure`
    + (comp.n_diffuse ? ` · ${comp.n_diffuse} diffuse` : ""));
  const confChips = (comp.confident||[]).map(x =>
    el("span",{class:"ctag", style:`color:${color(x.c)}`}, `${nm[x.c]||('class '+x.c)} ${x.n}`));
  const conf = el("div",{class:"comp-row"},
    [el("span",{class:"comp-lbl"},"confident:")].concat(
      confChips.length ? confChips : [el("span",{class:"ctag muted"},"none")]));
  const qChips = (comp.questions||[]).map(x =>
    el("span",{class:"ctag"}, `${nm[x.a]||('c'+x.a)} vs ${nm[x.b]||('c'+x.b)} ×${x.n}`));
  if (comp.n_diffuse) qChips.push(el("span",{class:"ctag muted"}, `diffuse ×${comp.n_diffuse}`));
  const q = el("div",{class:"comp-row"},
    [el("span",{class:"comp-lbl"},"asking:")].concat(
      qChips.length ? qChips : [el("span",{class:"ctag muted"},"none")]));
  const hint = el("div",{class:"comp-hint"}, "→ " + compHint(comp, c, nm));
  return el("div",{class:"comp"},[head, conf, q, hint]);
}

// "Why this tile?" -- collapsible, rendered from the flight's selection_params
// (the abstain-rule values + one real example pixel captured at ingest). Class
// names come from the flight scheme (names()), the single source on the app.
function whyPanel() {
  const s = state.selection;
  if (!s || !s.rule) return null;
  const r = s.rule, nm = names();
  const pct = x => `${Math.round(x * 100)}%`;
  const pts = x => `${Math.round(x * 100)} points`;
  const kids = [
    el("summary", {style:"cursor:pointer;color:var(--a);font-size:13px"}, "Why this tile?"),
    el("p", {style:"margin:8px 0;color:var(--muted);font-size:13px;line-height:1.5"},
      `First, and only once, the entire raster is split into tiles or Superpixels. A model is trained and used to predict every pixel on the raster. When a pixel's `
      + `top two guesses are within ${pts(r.min_margin)} of each other and together `
      + `cover at least ${pct(r.mass_cutoff)} of the probability, it's too close to `
      + `call and that pixel gets flagged. Now all tiles are checked to see if flagged pixels have landed in them. `
      + `A tile is shown to you if at least ${pct(r.min_abstain_frac)} of its pixels consist of flagged pixels. The tile is shown in outline form within a slightly larger ~${r.window_m} m view.. `
      + `Then it's your call. If you choose a class as the label, the entire tile (all of its pixels) are labeled with that class, i.e., you are saying the entire tile is of a single class. `
      + `If you instead decide the tile holds pixels of mixed classes, then you would choose the Split option. You also have the option to Skip if you would rather not make a decision at this point. `
      + `The Out of scope choice allows you to mark tiles that should be taken out of consideration in general, e.g., out of bounds of the marsh. `
      + `The tiles that you do label will eventually be added to Ground Truth and can be used in subsequent training runs.`),
  ];
  const ex = s.example;
  if (ex && ex.probs) {
    const pair = ex.pair || [];
    const rows = ex.probs.map((p, i) => {
      const hot = pair.includes(i);
      return el("div", {style:"display:flex;justify-content:space-between;padding:2px 8px;"
          + "font-size:12px;border-radius:4px;"
          + (hot ? "background:rgba(255,255,255,.08);font-weight:600" : "")},
        [ el("span", {}, nm[i] || `class ${i}`), el("span", {}, pct(p)) ]);
    });
    const an = nm[pair[0]] || `class ${pair[0]}`, bn = nm[pair[1]] || `class ${pair[1]}`;
    kids.push(el("p", {style:"margin:8px 0 4px;color:var(--muted);font-size:13px"},
      "An example pixel the model flagged:"));
    kids.push(el("div", {style:"max-width:300px"}, rows));
    kids.push(el("p", {style:"margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5"},
      `The top two (${an}, ${bn}) are clearly above the rest but only `
      + `${pts(ex.top2_margin)} apart — too close to call — so this pixel was flagged.`));
  }
  return el("details", {style:"max-width:560px;margin:6px auto 0;text-align:left"}, kids);
}

function render() {
  const c = state.current.container;
  const aName = c.class_a_name || `class ${c.class_a}`;
  const bName = c.class_b_name || `class ${c.class_b}`;

  const views = el("div",{class:"views"},
    Object.keys(c.chip_keys||{}).map(v =>
      el("button",{ "aria-pressed": String(v===state.view),
        onclick:()=>{ state.view=v; render(); } }, v)));

  const center = el("div",{class:"center"},[
    el("img",{class:"chip", src:chipUrl(c.chip_keys), alt:"container chip"}),
    views,
    compPanel(),
    el("div",{class:"meta"},[
      el("span",{}, `sp ${c.superpixel_id}`),
      el("span",{}, `abstain ${(c.abstain_frac*100).toFixed(0)}%`),
      el("span",{}, `purity ${c.pair_purity!=null ? c.pair_purity.toFixed(2) : "—"}`),
    ]),
  ]);

  const sides = el("div",{class:"sides"},[
    el("button",{class:"a", onclick:()=>answer("label", c.class_a)},
      [ el("div",{},aName), el("div",{class:"key"},"press 1") ]),
    el("button",{class:"b", onclick:()=>answer("label", c.class_b)},
      [ el("div",{},bName), el("div",{class:"key"},"press 2") ]),
  ]);

  const palette = el("div",{class:"palette"},
    [ el("span",{class:"lbl"},"or a different class:") ].concat(
      Object.entries(names()).map(([id,nm]) =>
        el("button",{onclick:()=>answer("label", Number(id))}, nm))));

  const escape = el("div",{class:"escape"},[
    el("button",{onclick:()=>answer("skip")}, [document.createTextNode("Skip "), el("span",{class:"key"},"s")]),
    el("button",{onclick:()=>answer("out_of_scope")}, [document.createTextNode("Out of scope "), el("span",{class:"key"},"o")]),
    el("button",{onclick:()=>answer("split")}, [document.createTextNode("Needs split "), el("span",{class:"key"},"x")]),
  ]);

  const blocks = [
    el("p",{class:"ask", html:`Model can't decide. Is this <b class="l">${aName}</b> or <b class="r">${bName}</b>?`}),
  ];
  const why = whyPanel();
  if (why) blocks.push(why);
  blocks.push(el("div",{class:"triptych"},[ gallery("l", c.class_a), center, gallery("r", c.class_b) ]));
  blocks.push(el("div",{class:"actions"},[ sides, palette, escape ]));
  $("#main").replaceChildren(...blocks);
}

async function answer(action, classId=null) {
  const c = state.current.container;
  await api("/api/labels", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ container_id:c.id, user:state.user, action, class_id:classId }) });
  loadNext();
}

document.addEventListener("keydown", (e) => {
  if (!state.current || e.target.tagName === "INPUT") return;
  const c = state.current.container;
  if (e.key === "1") answer("label", c.class_a);
  else if (e.key === "2") answer("label", c.class_b);
  else if (e.key === "s") answer("skip");
  else if (e.key === "o") answer("out_of_scope");
  else if (e.key === "x") answer("split");
});

$("#changeUser").addEventListener("click", () => { localStorage.removeItem("ml_user"); state.user=""; gate(); });

state.user ? start() : gate();
</script>
</body>
</html>
